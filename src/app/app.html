<header class="app-header">
  <div class="app-header__inner">
    <a routerLink="/" class="app-header__logo" aria-label="Poll App home">
      <img
        [src]="lightTheme() ? 'assets/logo-on-light.svg' : 'assets/logo.svg'"
        alt="Poll App"
        class="app-header__logo-img"
      />
    </a>
    @if (showCreateCta()) {
      <a routerLink="/create" class="app-header__cta">
        <span>New survey</span>
        <span class="app-header__cta-icon-slot" aria-hidden="true">
          <svg
            class="app-header__cta-icon"
            width="24"
            height="24"
            viewBox="132 12 24 24"
            fill="none"
          >

            />
          </svg>
        </span>
      </a>
    }
  </div>
</header>

<router-outlet />

@if (publishedMessage()) {
  <div
    class="published-toast"
    role="status"
    aria-live="polite"
    aria-labelledby="published-toast-title"
  >
    <h2 id="published-toast-title" class="published-toast__title">
      {{ publishedMessage() }}
    </h2>
    <button
      type="button"
      class="published-toast__close"
      (click)="dismissPublishedMessage()"
      aria-label="Dismiss notification"
    >×</button>
  </div>
}
